<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos - Seguimiento PPDJ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Antonio:wght@700&family=Figtree:wght@400;500;600;700;800&display=swap');

:root {
  /* Paleta del tablero original (diseño de Carolina): navy + rosa */
  --navy: #1e2a5c;
  --rosa: #ee3a5e;
  --gris-oscuro: #23252b;
  --gris: #6b7280;
  --gris-claro: #eef1f7;
  --blanco: #ffffff;
  /* Colores de los informes de Carolina (navy #0C1250 / naranja #F28E1C),
     ajustados al paso más cercano que pasa la validación de accesibilidad */
  --valor: #2c47a5;   /* serie reportada: navy del informe, aclarado */
  --meta: #c96a08;    /* serie meta: naranja del informe, oscurecido */
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Figtree', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--blanco);
  color: var(--gris-oscuro);
}

/* Encabezado del tablero original: píldora navy con sombra rosada y home */
.encabezado {
  max-width: 1360px;
  margin: 0 auto;
  padding: 1.4rem 1.5rem 0.8rem;
  display: flex; align-items: center; gap: 1.4rem;
}
.titulo-pill {
  flex: 1;
  background: var(--navy);
  color: var(--blanco);
  font-weight: 800;
  font-size: clamp(1.15rem, 2.4vw, 1.8rem);
  border-radius: 20px;
  box-shadow: 6px 6px 0 var(--rosa);
  padding: 0.75rem 1.5rem;
}
.btn-icono { display: inline-block; transition: transform 0.15s ease; }
.btn-icono:hover { transform: translateY(-2px); }
.btn-icono img { height: 48px; display: block; }
.icono-filtro { width: 20px; height: 20px; }

main { max-width: 1360px; margin: 0 auto; padding: 1.6rem 1.5rem 3rem; }

.filtros {
  background: var(--gris-claro);
  border-radius: 10px;
  padding: 1rem 1.3rem;
  display: flex; align-items: center; gap: 1.4rem; flex-wrap: wrap;
  margin-bottom: 1.2rem;
}
.filtro-grupo { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.filtro-label {
  font-family: 'Antonio', sans-serif;
  font-weight: 700; text-transform: uppercase;
  font-size: 0.75rem; letter-spacing: 0.08em;
  color: var(--gris);
}
select {
  font-family: inherit; font-size: 0.9rem;
  padding: 0.45rem 0.7rem;
  border: 1.5px solid #ddd6cf; border-radius: 8px;
  background: var(--blanco); color: var(--gris-oscuro);
}
.chip {
  font-size: 0.8rem;
  border: 1.5px solid #ddd6cf;
  border-radius: 8px;
  background: var(--blanco);
  padding: 0.32rem 0.7rem;
  cursor: pointer;
  color: var(--gris);
  font-family: inherit;
}
.chip.activo {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--blanco);
}

.panel-doble { display: grid; grid-template-columns: minmax(380px, 46%) 1fr; gap: 1.2rem; align-items: start; }
@media (max-width: 980px) { .panel-doble { grid-template-columns: 1fr; } }

.card {
  background: var(--blanco);
  border-radius: 10px;
  box-shadow: 0 2px 10px rgba(30,42,92,0.10);
  padding: 1.3rem;
}
.card-titulo {
  font-family: 'Antonio', sans-serif;
  font-weight: 700; text-transform: uppercase;
  font-size: 0.95rem; letter-spacing: 0.06em;
  margin-bottom: 0.8rem;
}
.conteo-tabla { color: var(--gris); font-size: 0.8rem; margin-bottom: 0.6rem; }
.nota-parcial { color: var(--gris); font-size: 0.75rem; margin-top: 0.6rem; }

.tabla-scroll { max-height: 620px; overflow-y: auto; overflow-x: auto; }
.celda-anio { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
th.th-anio { text-align: right; }
.celda-texto { min-width: 200px; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th {
  font-family: 'Antonio', sans-serif;
  font-weight: 700; text-transform: uppercase;
  font-size: 0.72rem; letter-spacing: 0.06em;
  color: var(--gris);
  text-align: left;
  padding: 0.5rem 0.6rem;
  border-bottom: 2px solid var(--gris-claro);
  position: sticky; top: 0; background: var(--blanco);
}
tbody td { padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--gris-claro); vertical-align: top; }
tbody tr { cursor: pointer; }
tbody tr:hover { background: #faf8f4; }
tbody tr.seleccionada { background: var(--gris-claro); }
.celda-num { font-family: 'Anton', sans-serif; font-size: 0.9rem; color: var(--gris); }
.celda-texto { line-height: 1.4; }
.celda-indicador { color: var(--gris); font-size: 0.8rem; }

.detalle-vacio { color: var(--gris); padding: 2.5rem 1rem; text-align: center; }
.dim-etiqueta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.dim-etiqueta span {
  font-family: 'Antonio', sans-serif; font-weight: 700;
  text-transform: uppercase; font-size: 0.78rem; letter-spacing: 0.08em;
  color: var(--gris);
}
.detalle-titulo { font-family: 'Antonio', sans-serif; font-weight: 700; font-size: 1.12rem; line-height: 1.3; margin-bottom: 0.3rem; }
.detalle-indicador { color: var(--gris); font-size: 0.9rem; line-height: 1.45; margin-bottom: 1rem; }

.ficha { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.7rem; margin-bottom: 1.2rem; }
.ficha-item { background: var(--gris-claro); border-radius: 8px; padding: 0.6rem 0.8rem; }
.ficha-label {
  font-family: 'Antonio', sans-serif; font-weight: 700;
  text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.08em;
  color: var(--gris); margin-bottom: 0.2rem;
}
.ficha-valor { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }

.grafica-caja { position: relative; height: 300px; }

.serie-tabla { margin-top: 1.1rem; overflow-x: auto; }
.serie-tabla table { font-size: 0.8rem; }
.serie-tabla td, .serie-tabla th { text-align: right; padding: 0.4rem 0.55rem; }
.serie-tabla td:first-child, .serie-tabla th:first-child { text-align: left; }
.serie-tabla tbody tr { cursor: default; }

.acciones { display: flex; gap: 0.7rem; margin-top: 1.2rem; flex-wrap: wrap; }
.btn {
  font-family: 'Antonio', sans-serif; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; font-size: 0.8rem;
  text-decoration: none; border-radius: 8px; padding: 0.55rem 1rem;
  cursor: pointer; border: 1.5px solid var(--navy);
  transition: transform 0.15s ease;
}
.btn:hover { transform: translateY(-2px); }
.btn-primario { background: var(--navy); color: var(--blanco); }
.btn-secundario { background: var(--blanco); color: var(--navy); }

footer {
  max-width: 1360px;
  margin: 1.5rem auto 0;
  padding: 0 1.5rem 1.5rem;
  display: flex; justify-content: flex-end;
}
.footer-logos { height: 48px; width: auto; }
</style>
</head>
<body>

<header class="encabezado">
  <div class="titulo-pill">Política Pública Distrital de Juventud 2019-2030</div>
  <a class="btn-icono" href="index.html" title="Volver al inicio"><img src="imagenes/disenio/Home.png" alt="Inicio"></a>
</header>

<main>
  <div class="filtros">
    <div class="filtro-grupo">
      <img class="icono-filtro" src="imagenes/disenio/Filtro.svg" alt="">
      <span class="filtro-label">Filtros</span>
    </div>
    <div class="filtro-grupo">
      <span class="filtro-label">Dimensión</span>
      <select id="filtro-dim"></select>
    </div>
    <div class="filtro-grupo">
      <span class="filtro-label">Sector líder</span>
      <div id="filtro-sectores" style="display:flex; gap:0.4rem; flex-wrap:wrap;"></div>
    </div>
  </div>

  <div class="panel-doble">
    <div class="card">
      <div class="card-titulo">Productos e indicadores</div>
      <div class="conteo-tabla" id="conteo-tabla"></div>
      <div class="tabla-scroll">
        <table>
          <thead id="cabeza-tabla"></thead>
          <tbody id="cuerpo-tabla"></tbody>
        </table>
      </div>
      <div class="nota-parcial" id="nota-parcial-maestro"></div>
    </div>

    <div class="card" id="panel-detalle">
      <div class="detalle-vacio">Selecciona un producto de la tabla para ver su detalle.</div>
    </div>
  </div>
</main>

<footer>
  <img class="footer-logos" src="imagenes/disenio/Logos.png" alt="Distrito Joven - Alcaldía Mayor de Bogotá - Secretaría Distrital de Integración Social">
</footer>

<script src="data/productos.js"></script>
<script>
// Página de detalle de Productos: filtros por dimensión y sector, tabla
// maestro, ficha del producto seleccionado y gráfica Valor vs Meta con
// alternador a porcentaje de cumplimiento.
(function () {
  const DATOS = window.DATOS_PRODUCTOS;
  if (!DATOS) {
    document.querySelector('main').innerHTML =
      '<p style="color:#83766c">No se pudieron cargar los datos (falta data/productos.js).</p>';
    return;
  }

  const COLOR_VALOR = getComputedStyle(document.documentElement).getPropertyValue('--valor').trim();
  const COLOR_META = getComputedStyle(document.documentElement).getPropertyValue('--meta').trim();
  const params = new URLSearchParams(location.search);

  const estado = {
    dim: params.get('dim') || '',            // "1".."7" o "" = todas
    sectores: new Set(),                      // vacío = todos
    llave: params.get('llave') || '',
  };
  let grafica = null;

  const fmt = (v, dec = 2) => (v === null || v === undefined) ? '—'
    : Number(v).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: dec });

  // El año parcial (corte en curso, ej. 2026 con solo el 1er trimestre)
  // se rotula con "p": 2026p
  const etiquetaAnio = a => a === DATOS.anio_parcial ? a + 'p' : String(a);

  // Formateador según el tipo de indicador: los "Porcentaje" guardados como
  // proporción (0 a 1) se muestran multiplicados por 100 con símbolo %; los
  // que ya vienen en escala 0-100 solo reciben el símbolo; escalas dudosas
  // se dejan crudas (calidad de datos pendiente con el equipo).
  function crearFormateadorItem(it) {
    if (it.indicador_tipo !== 'Porcentaje') return v => fmt(v);
    const vals = it.serie.flatMap(p => [p.valor, p.meta, p.acumulado, p.meta_acum])
      .filter(v => v !== null && v !== undefined).map(Math.abs);
    const max = vals.length ? Math.max(...vals) : 0;
    if (max <= 1.5) return v => (v === null || v === undefined) ? '—' : fmt(v * 100, 1) + ' %';
    if (max <= 150) return v => (v === null || v === undefined) ? '—' : fmt(v, 1) + ' %';
    return v => fmt(v);
  }

  const dimPorKey = {};
  DATOS.dimensiones.forEach(d => { dimPorKey[d.key] = d; });

  // ---- filtros ----
  function initFiltros() {
    const sel = document.getElementById('filtro-dim');
    sel.innerHTML = '<option value="">Todas las dimensiones</option>' +
      DATOS.dimensiones.map(d =>
        `<option value="${d.key.replace('.', '')}">${d.key} ${d.nombre}</option>`).join('');
    sel.value = estado.dim;
    sel.addEventListener('change', () => {
      estado.dim = sel.value;
      estado.llave = '';
      sincronizarUrl();
      pintarSectores();
      pintarTabla();
    });

    pintarSectores();
  }

  // Solo los sectores con ítems en la dimensión elegida; sin dimensión, todos
  function sectoresDisponibles() {
    const items = DATOS.items.filter(it =>
      !estado.dim || it.key_dimension === estado.dim + '.');
    return [...new Set(items.map(it => it.sector_lider).filter(Boolean))].sort();
  }

  function pintarSectores() {
    const caja = document.getElementById('filtro-sectores');
    const disponibles = sectoresDisponibles();
    // descarta selecciones que ya no aplican a la dimensión elegida
    [...estado.sectores].forEach(s => { if (!disponibles.includes(s)) estado.sectores.delete(s); });
    caja.innerHTML = '';
    const todos = document.createElement('button');
    todos.className = 'chip' + (estado.sectores.size === 0 ? ' activo' : '');
    todos.textContent = 'Todos';
    todos.addEventListener('click', () => {
      estado.sectores.clear();
      pintarSectores();
      pintarTabla();
    });
    caja.appendChild(todos);
    disponibles.forEach(s => {
      const b = document.createElement('button');
      b.className = 'chip' + (estado.sectores.has(s) ? ' activo' : '');
      b.textContent = s;
      b.addEventListener('click', () => {
        if (estado.sectores.has(s)) estado.sectores.delete(s); else estado.sectores.add(s);
        pintarSectores();
        pintarTabla();
      });
      caja.appendChild(b);
    });
  }

  function itemsFiltrados() {
    return DATOS.items.filter(it =>
      (!estado.dim || it.key_dimension === estado.dim + '.') &&
      (estado.sectores.size === 0 || estado.sectores.has(it.sector_lider)));
  }

  function sincronizarUrl() {
    const p = new URLSearchParams();
    if (estado.dim) p.set('dim', estado.dim);
    if (estado.llave) p.set('llave', estado.llave);
    history.replaceState(null, '', location.pathname + (p.toString() ? '?' + p : ''));
  }

  // ---- tabla maestro ----
  function pintarTabla() {
    const items = itemsFiltrados();
    const cuerpo = document.getElementById('cuerpo-tabla');
    document.getElementById('conteo-tabla').textContent =
      items.length.toLocaleString('es-CO') + ' de ' + DATOS.items.length.toLocaleString('es-CO') + ' productos';
    cuerpo.innerHTML = '';
    items.forEach(it => {
      const tr = document.createElement('tr');
      tr.dataset.llave = it.llave;
      if (it.llave === estado.llave) tr.classList.add('seleccionada');
      const f = crearFormateadorItem(it);
      const celdasAnios = it.serie.map(p =>
        `<td class="celda-anio">${p.valor === null ? '—' : f(p.valor)}</td>`).join('');
      tr.innerHTML = `
        <td class="celda-texto">${it.esperado || ''}</td>
        <td class="celda-texto celda-indicador">${it.indicador || ''}</td>${celdasAnios}`;
      tr.addEventListener('click', () => seleccionar(it.llave));
      cuerpo.appendChild(tr);
    });
    // si el ítem seleccionado quedó fuera del filtro, limpia el detalle
    if (estado.llave && !items.some(it => it.llave === estado.llave)) {
      estado.llave = '';
      sincronizarUrl();
    }
    pintarDetalle();
  }

  function seleccionar(llave) {
    estado.llave = llave;
    sincronizarUrl();
    document.querySelectorAll('#cuerpo-tabla tr').forEach(tr =>
      tr.classList.toggle('seleccionada', tr.dataset.llave === llave));
    pintarDetalle();
  }

  // ---- panel de detalle ----
  function pintarDetalle() {
    const panel = document.getElementById('panel-detalle');
    const it = DATOS.items.find(i => i.llave === estado.llave);
    if (!it) {
      panel.innerHTML = '<div class="detalle-vacio">Selecciona un producto de la tabla para ver su detalle.</div>';
      if (grafica) { grafica.destroy(); grafica = null; }
      return;
    }
    const dim = dimPorKey[it.key_dimension];
    panel.innerHTML = `
      <div class="dim-etiqueta">
        <span>${dim.key} ${dim.nombre}</span>
      </div>
      <div class="detalle-titulo">${it.esperado || ''}</div>
      <div class="detalle-indicador">${it.indicador || ''}</div>
      <div class="ficha">
        <div class="ficha-item"><div class="ficha-label">Sector líder</div><div class="ficha-valor">${it.sector_lider || '—'}</div></div>
        <div class="ficha-item"><div class="ficha-label">Tipo de anualización</div><div class="ficha-valor">${it.tipo_anualizacion || '—'}</div></div>
        <div class="ficha-item"><div class="ficha-label">Indicador tipo</div><div class="ficha-valor">${it.indicador_tipo || '—'}</div></div>
      </div>
      <div class="grafica-caja"><canvas id="grafica"></canvas></div>
      <div class="serie-tabla" id="serie-tabla"></div>
      <div class="acciones">
        <a class="btn btn-primario" href="productos-cualitativo.html?llave=${it.llave}">Ver análisis cualitativo</a>
        <a class="btn btn-secundario" href="indicadores.html">&iquest;Qué es el tipo de anualización?</a>
      </div>`;
    pintarGrafica(it);
    pintarSerieTabla(it);
  }

  function pintarGrafica(it) {
    // formateador según el tipo de indicador (proporciones ×100 con %)
    const fSerie = crearFormateadorItem(it);
    // La gráfica pinta el ACUMULADO contra la meta acumulada, igual que el
    // Power BI original (la tabla maestro sí muestra los valores anuales).
    // Para Constante y Decreciente el acumulado es el mismo valor anual.
    const etiquetas = it.serie.map(p => etiquetaAnio(p.anio));
    const datosValor = it.serie.map(p => p.acumulado);
    const datosMeta = it.serie.map(p => p.meta_acum);
    // la gráfica arranca en el primer año con dato o meta, como el Power BI
    while (etiquetas.length > 1 && datosValor[0] == null && datosMeta[0] == null) {
      etiquetas.shift(); datosValor.shift(); datosMeta.shift();
    }
    // aire del eje solo hacia arriba; piso anclado en 0 salvo negativos reales
    const valoresTodos = [...datosValor, ...datosMeta].filter(v => v !== null && v !== undefined);
    const minDato = valoresTodos.length ? Math.min(...valoresTodos) : 0;
    const maxDato = valoresTodos.length ? Math.max(...valoresTodos) : 0;

    // Etiquetas de datos sobre cada punto de la serie principal, como en el
    // Power BI: permiten revisar y sacar pantallazos sin pasar el mouse.
    // La última meta lleva una píldora propia que esquiva la etiqueta del
    // producto para que no se monten; si se oculta el producto en la
    // leyenda, la meta muestra el valor de todos sus puntos.
    const etiquetasDatos = {
      id: 'etiquetasDatos',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = "600 11px Figtree, 'Segoe UI', sans-serif";
        ctx.textAlign = 'center';
        const cajas = [];  // píldoras ya pintadas, para detectar choques

        function pintarPildora(pt, texto, color, preferirArriba) {
          const ancho = ctx.measureText(texto).width + 10;
          const candidatos = preferirArriba ? [pt.y - 16, pt.y + 18] : [pt.y + 18, pt.y - 16];
          let y = candidatos[candidatos.length - 1];
          for (const cand of candidatos) {
            const caja = { x1: pt.x - ancho / 2, x2: pt.x + ancho / 2, y1: cand - 8, y2: cand + 8 };
            const dentro = caja.y1 > chart.chartArea.top - 10;
            const choca = cajas.some(c =>
              caja.x1 < c.x2 && caja.x2 > c.x1 && caja.y1 < c.y2 && caja.y2 > c.y1);
            if (dentro && !choca) { y = cand; break; }
          }
          ctx.fillStyle = 'rgba(244,242,238,0.92)';
          ctx.beginPath();
          ctx.roundRect(pt.x - ancho / 2, y - 8, ancho, 16, 4);
          ctx.fill();
          ctx.fillStyle = color;
          ctx.fillText(texto, pt.x, y + 4);
          cajas.push({ x1: pt.x - ancho / 2, x2: pt.x + ancho / 2, y1: y - 8, y2: y + 8 });
        }

        if (chart.isDatasetVisible(0)) {
          const puntos = chart.getDatasetMeta(0).data;
          const valores = chart.data.datasets[0].data;
          puntos.forEach((pt, i) => {
            const v = valores[i];
            if (v === null || v === undefined) return;
            pintarPildora(pt, fSerie(v), '#2f2b28', pt.y - 16 > chart.chartArea.top);
          });
        }
        if (chart.isDatasetVisible(1)) {
          const puntosMeta = chart.getDatasetMeta(1).data;
          const valoresMeta = chart.data.datasets[1].data;
          if (chart.isDatasetVisible(0)) {
            // etiqueta de la última meta al final de la línea, como en los
            // informes (en el color de la serie meta)
            let ultimo = -1;
            valoresMeta.forEach((v, i) => { if (v !== null && v !== undefined) ultimo = i; });
            if (ultimo >= 0 && puntosMeta[ultimo]) {
              pintarPildora(puntosMeta[ultimo], fSerie(valoresMeta[ultimo]), COLOR_META, true);
            }
          } else {
            // con el producto oculto, la meta muestra todos sus valores
            puntosMeta.forEach((pt, i) => {
              const v = valoresMeta[i];
              if (v === null || v === undefined) return;
              pintarPildora(pt, fSerie(v), COLOR_META, pt.y - 16 > chart.chartArea.top);
            });
          }
        }
        ctx.restore();
      },
    };

    if (grafica) grafica.destroy();
    grafica = new Chart(document.getElementById('grafica'), {
      type: 'line',
      plugins: [etiquetasDatos],
      data: {
        labels: etiquetas,
        datasets: [
          {
            label: 'Producto reportado',
            data: datosValor,
            borderColor: COLOR_VALOR, backgroundColor: COLOR_VALOR,
            borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 6, tension: 0.25,
            order: 2,  // se dibuja debajo: la meta punteada queda visible encima
          },
          {
            label: 'Meta',
            data: datosMeta,
            // Meta con leve transparencia y punteado corto: queda como
            // referencia recesiva y el producto reportado domina la lectura
            borderColor: COLOR_META + 'cc', backgroundColor: COLOR_META,
            borderWidth: 1.8, borderDash: [2, 5], borderCapStyle: 'round',
            pointRadius: 0, pointHoverRadius: 5,
            tension: 0,
            order: 1,  // encima del producto, para verse cuando se superponen
          },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 20, right: 60, left: 6 } },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, font: { family: 'Figtree' } } },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.dataset.label + ': ' +
                (ctx.parsed.y === null ? 'sin dato' : fSerie(ctx.parsed.y)),
              // diferencia entre el punto y la meta, como en el Power BI
              footer: items => {
                const v = items.find(i => i.datasetIndex === 0);
                const m = items.find(i => i.datasetIndex === 1);
                if (!v || !m || v.parsed.y === null || m.parsed.y === null) return '';
                return 'Diferencia: ' + fSerie(v.parsed.y - m.parsed.y);
              },
            },
          },
        },
        scales: {
          y: {
            // aire solo hacia arriba (para las etiquetas); el piso queda en 0
            // salvo que existan valores negativos reales
            ...(minDato >= 0 ? { min: 0 } : {}),
            suggestedMax: (maxDato || 1) * 1.15,
            grid: { color: '#efeae3' },
            ticks: { font: { family: 'Figtree' }, callback: v => fSerie(v) },
          },
          x: { grid: { display: false }, ticks: { font: { family: 'Figtree' } } },
        },
      },
    });
  }

  function pintarSerieTabla(it) {
    const f = crearFormateadorItem(it);
    // Columnas según el tipo de anualización:
    // - Constante / Decreciente no acumulan: solo valor y meta.
    // - Creciente: el sector reporta el ACUMULADO y la meta es un nivel —
    //   la tabla abre con lo mismo que pinta el gráfico, y el avance del
    //   año (nivel menos nivel del año anterior) queda al final como
    //   columna complementaria. No hay "Meta acum.": duplicaría la meta.
    // - Suma: valor y meta del año más el acumulado corrido de ambos.
    let columnas;
    if (['Constante', 'Decreciente'].includes(it.tipo_anualizacion)) {
      columnas = [['Valor', 'valor'], ['Meta', 'meta']];
    } else if (it.tipo_anualizacion === 'Creciente') {
      columnas = [['Acumulado', 'acumulado'], ['Meta', 'meta'], ['Avance del año', 'valor']];
    } else {
      columnas = [['Valor', 'valor'], ['Meta', 'meta'],
                  ['Acumulado', 'acumulado'], ['Meta acum.', 'meta_acum']];
    }
    const filas = it.serie.filter(p => columnas.some(([, campo]) => p[campo] !== null));
    const nota = DATOS.nota_parcial && filas.some(p => p.anio === DATOS.anio_parcial)
      ? `<div class="nota-parcial">${DATOS.nota_parcial}</div>` : '';
    document.getElementById('serie-tabla').innerHTML = `
      <table>
        <thead><tr><th>Año</th>${columnas.map(([titulo]) => `<th>${titulo}</th>`).join('')}</tr></thead>
        <tbody>${filas.map(p => `
          <tr>
            <td>${etiquetaAnio(p.anio)}</td>${columnas.map(([, campo]) => `<td>${f(p[campo])}</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>${nota}`;
  }

  // encabezado de la tabla con las columnas de años (como en el Power BI)
  document.getElementById('cabeza-tabla').innerHTML =
    '<tr><th>Producto esperado</th><th>Indicador</th>' +
    DATOS.anios.map(a => `<th class="th-anio">${etiquetaAnio(a)}</th>`).join('') + '</tr>';
  if (DATOS.nota_parcial) {
    document.getElementById('nota-parcial-maestro').textContent = DATOS.nota_parcial;
  }

  initFiltros();
  pintarTabla();
})();
</script>
