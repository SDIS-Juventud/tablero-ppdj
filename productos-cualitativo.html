<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análisis cualitativo de productos - Seguimiento PPDJ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Antonio:wght@700&family=Figtree:wght@400;500;600;700;800&display=swap');

:root {
  /* Paleta del tablero original (diseño de Carolina): navy + rosa */
  --navy: #1e2a5c;
  --rosa: #ee3a5e;
  --gris-oscuro: #23252b;
  --gris: #6b7280;
  --gris-claro: #eef1f7;
  --blanco: #ffffff;
  /* Colores de los informes de Carolina (navy #0C1250 / naranja #F28E1C),
     ajustados al paso más cercano que pasa la validación de accesibilidad */
  --valor: #2c47a5;   /* serie reportada: navy del informe, aclarado */
  --meta: #c96a08;    /* serie meta: naranja del informe, oscurecido */
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Figtree', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--blanco);
  color: var(--gris-oscuro);
}
/* Encabezado del tablero original: píldora navy con sombra rosada y home */
.encabezado {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.4rem 1.5rem 0.8rem;
  display: flex; align-items: center; gap: 1.4rem;
}
.titulo-pill {
  flex: 1;
  background: var(--navy);
  color: var(--blanco);
  font-weight: 800;
  font-size: clamp(1.1rem, 2.2vw, 1.6rem);
  border-radius: 20px;
  box-shadow: 6px 6px 0 var(--rosa);
  padding: 0.7rem 1.4rem;
}
.btn-icono { display: inline-block; transition: transform 0.15s ease; }
.btn-icono:hover { transform: translateY(-2px); }
.btn-icono img { height: 48px; display: block; }

main { max-width: 960px; margin: 0 auto; padding: 1.6rem 1.5rem 3rem; }
.card {
  background: var(--blanco); border-radius: 10px;
  box-shadow: 0 2px 10px rgba(30,42,92,0.10); padding: 1.3rem;
  margin-bottom: 1.2rem;
}
.dim-etiqueta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.dim-etiqueta span {
  font-family: 'Antonio', sans-serif; font-weight: 700;
  text-transform: uppercase; font-size: 0.78rem; letter-spacing: 0.08em; color: var(--gris);
}
/* Etiqueta de producto nuevo (entró con la actualización del plan, 2025) */
.tag-nuevo, .dim-etiqueta .tag-nuevo {
  font-family: 'Antonio', sans-serif; font-weight: 700;
  text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.08em;
  color: var(--rosa); border: 1.5px solid var(--rosa);
  border-radius: 6px; padding: 0.08rem 0.45rem;
  white-space: nowrap; vertical-align: middle;
}
.detalle-titulo { font-family: 'Antonio', sans-serif; font-weight: 700; font-size: 1.12rem; line-height: 1.3; margin-bottom: 0.3rem; }
.detalle-indicador { color: var(--gris); font-size: 0.9rem; line-height: 1.45; margin-bottom: 0.9rem; }
.ficha { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.7rem; }
.ficha-item { background: var(--gris-claro); border-radius: 8px; padding: 0.6rem 0.8rem; }
.ficha-label {
  font-family: 'Antonio', sans-serif; font-weight: 700; text-transform: uppercase;
  font-size: 0.65rem; letter-spacing: 0.08em; color: var(--gris); margin-bottom: 0.2rem;
}
.ficha-valor { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }

.filtros { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
.filtro-label {
  font-family: 'Antonio', sans-serif; font-weight: 700; text-transform: uppercase;
  font-size: 0.75rem; letter-spacing: 0.08em; color: var(--gris);
}
select {
  font-family: inherit; font-size: 0.9rem; padding: 0.45rem 0.7rem;
  border: 1.5px solid #ddd6cf; border-radius: 8px; background: var(--blanco); color: var(--gris-oscuro);
}
.chip {
  font-size: 0.8rem; border: 1.5px solid #ddd6cf; border-radius: 8px;
  background: var(--blanco); padding: 0.32rem 0.7rem; cursor: pointer;
  color: var(--gris); font-family: inherit;
}
.chip.activo { background: var(--navy); border-color: var(--navy); color: var(--blanco); }

.grafica-caja { position: relative; height: 260px; margin-top: 1rem; }

.registro { border-bottom: 1px solid var(--gris-claro); padding: 1rem 0; }
.registro:last-child { border-bottom: none; }
.registro-encabezado {
  font-family: 'Antonio', sans-serif; font-weight: 700; text-transform: uppercase;
  font-size: 0.78rem; letter-spacing: 0.06em; color: var(--gris); margin-bottom: 0.4rem;
}
.registro-texto { font-size: 0.92rem; line-height: 1.55; white-space: pre-line; }
.detalle-vacio { color: var(--gris); padding: 2rem 1rem; text-align: center; }
.conteo { color: var(--gris); font-size: 0.8rem; margin-bottom: 0.4rem; }

footer {
  max-width: 960px;
  margin: 1.5rem auto 0;
  padding: 0 1.5rem 1.5rem;
  display: flex; justify-content: flex-end;
}
.footer-logos { height: 48px; width: auto; }
</style>
</head>
<body>

<header class="encabezado">
  <div class="titulo-pill">Análisis cualitativo</div>
  <a class="btn-icono" id="btn-volver" href="productos.html" title="Volver a productos"><img src="imagenes/disenio/Devolverse.png" alt="Volver a productos"></a>
  <a class="btn-icono" href="index.html" title="Volver al inicio"><img src="imagenes/disenio/Home.png" alt="Inicio"></a>
</header>

<main>
  <div class="card" id="panel-item">
    <div class="detalle-vacio">Llega a esta página desde el botón "Ver análisis cualitativo" de un producto.</div>
  </div>

  <div class="card" id="panel-filtros" style="display:none">
    <div class="filtros">
      <span class="filtro-label">Año</span>
      <select id="filtro-anio"><option value="">Todos</option></select>
      <span class="filtro-label">Trimestre</span>
      <select id="filtro-trimestre"><option value="">Todos</option></select>
      <span class="filtro-label">Tipo</span>
      <div id="filtro-tipos" style="display:flex; gap:0.4rem;"></div>
    </div>
  </div>

  <div class="card" id="panel-registros" style="display:none">
    <div class="conteo" id="conteo"></div>
    <div id="registros"></div>
  </div>
</main>

<footer>
  <img class="footer-logos" src="imagenes/disenio/Logos.png" alt="Distrito Joven - Alcaldía Mayor de Bogotá - Secretaría Distrital de Integración Social">
</footer>

<script src="data/productos.js"></script>
<script src="data/productos-cualitativo.js"></script>
<script>
// Análisis cualitativo de un producto: llega por querystring (?llave=P12),
// muestra la ficha del producto y la bitácora trimestral con filtros por
// año, trimestre y tipo (Cualitativo / Enfoques).
(function () {
  const CUANTI = window.DATOS_PRODUCTOS;
  const CUALI = window.DATOS_PRODUCTOS_CUALI;
  const params = new URLSearchParams(location.search);
  const llave = params.get('llave') || '';

  if (!CUANTI || !CUALI) {
    document.querySelector('main').innerHTML =
      '<p style="color:#83766c">No se pudieron cargar los datos (carpeta data/).</p>';
    return;
  }

  const item = CUANTI.items.find(i => i.llave === llave);
  const registros = (CUALI.por_llave[llave] || []);
  const estado = { anio: '', trimestre: '', tipo: '' };

  // el botón de volver conserva el producto seleccionado
  if (llave) document.getElementById('btn-volver').href = 'productos.html?llave=' + llave;

  if (!item) return; // se queda el mensaje de la ficha vacía

  const dim = CUANTI.dimensiones.find(d => d.key === item.key_dimension);
  document.getElementById('panel-item').innerHTML = `
    <div class="dim-etiqueta">
      <span>${dim.key} ${dim.nombre}</span>${item.nuevo_2025 ? '<span class="tag-nuevo">Producto nuevo · 2025</span>' : ''}
    </div>
    <div class="detalle-titulo">${item.esperado || ''}</div>
    <div class="detalle-indicador">${item.indicador || ''}</div>
    <div class="ficha">
      <div class="ficha-item"><div class="ficha-label">Sector líder</div><div class="ficha-valor">${item.sector_lider || '—'}</div></div>
      <div class="ficha-item"><div class="ficha-label">Tipo de anualización</div><div class="ficha-valor">${item.tipo_anualizacion || '—'}</div></div>
      <div class="ficha-item"><div class="ficha-label">Indicador tipo</div><div class="ficha-valor">${item.indicador_tipo || '—'}</div></div>
    </div>
    <div class="grafica-caja"><canvas id="grafica"></canvas></div>`;

  // Gráfica igual a la de productos.html: acumulado vs meta acumulada, con
  // etiquetas de datos sobre los puntos (misma vista que el Power BI).
  const COLOR_VALOR = getComputedStyle(document.documentElement).getPropertyValue('--valor').trim();
  const COLOR_META = getComputedStyle(document.documentElement).getPropertyValue('--meta').trim();
  const fmt = (v, dec = 2) => (v === null || v === undefined) ? '—'
    : Number(v).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: dec });
  // los indicadores tipo Porcentaje guardados como proporción (0-1) se
  // muestran ×100 con %; los que ya vienen 0-100 solo reciben el símbolo
  const fItem = (() => {
    if (item.indicador_tipo !== 'Porcentaje') return v => fmt(v);
    const vals = item.serie.flatMap(p => [p.valor, p.meta, p.acumulado, p.meta_acum])
      .filter(v => v !== null && v !== undefined).map(Math.abs);
    const max = vals.length ? Math.max(...vals) : 0;
    if (max <= 1.5) return v => (v === null || v === undefined) ? '—' : fmt(v * 100, 1) + ' %';
    if (max <= 150) return v => (v === null || v === undefined) ? '—' : fmt(v, 1) + ' %';
    return v => fmt(v);
  })();
  let grafica = null;

  function pintarGrafica() {
    const fSerie = fItem;
    const etiquetas = item.serie.map(p => p.anio);
    const datosValor = item.serie.map(p => p.acumulado);
    const datosMeta = item.serie.map(p => p.meta_acum);
    // la gráfica arranca en el primer año con dato o meta, como el Power BI
    while (etiquetas.length > 1 && datosValor[0] == null && datosMeta[0] == null) {
      etiquetas.shift(); datosValor.shift(); datosMeta.shift();
    }
    const valoresTodos = [...datosValor, ...datosMeta].filter(v => v !== null && v !== undefined);
    const minDato = valoresTodos.length ? Math.min(...valoresTodos) : 0;
    const maxDato = valoresTodos.length ? Math.max(...valoresTodos) : 0;
    const etiquetasDatos = {
      id: 'etiquetasDatos',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        const puntos = chart.getDatasetMeta(0).data;
        const valores = chart.data.datasets[0].data;
        ctx.save();
        ctx.font = "600 11px Figtree, 'Segoe UI', sans-serif";
        ctx.textAlign = 'center';
        puntos.forEach((pt, i) => {
          const v = valores[i];
          if (v === null || v === undefined) return;
          const texto = fSerie(v);
          const ancho = ctx.measureText(texto).width + 10;
          const arriba = pt.y - 16 > chart.chartArea.top;
          const y = arriba ? pt.y - 16 : pt.y + 18;
          ctx.fillStyle = 'rgba(244,242,238,0.92)';
          ctx.beginPath();
          ctx.roundRect(pt.x - ancho / 2, y - 8, ancho, 16, 4);
          ctx.fill();
          ctx.fillStyle = '#2f2b28';
          ctx.fillText(texto, pt.x, y + 4);
        });
        // etiqueta de la última meta al final de la línea, como en los
        // informes (en el color de la serie meta)
        const puntosMeta = chart.getDatasetMeta(1).data;
        const valoresMeta = chart.data.datasets[1].data;
        let ultimo = -1;
        valoresMeta.forEach((v, i) => { if (v !== null && v !== undefined) ultimo = i; });
        if (ultimo >= 0 && puntosMeta[ultimo]) {
          ctx.textAlign = 'left';
          ctx.fillStyle = COLOR_META;
          ctx.fillText(fSerie(valoresMeta[ultimo]),
                       puntosMeta[ultimo].x + 8, puntosMeta[ultimo].y + 4);
        }
        ctx.restore();
      },
    };
    if (grafica) grafica.destroy();
    grafica = new Chart(document.getElementById('grafica'), {
      type: 'line',
      plugins: [etiquetasDatos],
      data: {
        labels: etiquetas,
        datasets: [
          { label: 'Producto reportado', data: datosValor,
            borderColor: COLOR_VALOR, backgroundColor: COLOR_VALOR,
            borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 6, tension: 0.25,
            order: 2 },
          { label: 'Meta', data: datosMeta,
            borderColor: COLOR_META + 'cc', backgroundColor: COLOR_META,
            borderWidth: 1.8, borderDash: [2, 5], borderCapStyle: 'round',
            pointRadius: 0, pointHoverRadius: 5, tension: 0,
            order: 1 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 20, right: 60, left: 6 } },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { position: 'top', labels: { usePointStyle: true, font: { family: 'Figtree' } } },
          tooltip: { callbacks: {
            label: ctx => ' ' + ctx.dataset.label + ': ' +
              (ctx.parsed.y === null ? 'sin dato' : fSerie(ctx.parsed.y)),
            footer: items => {
              const v = items.find(i => i.datasetIndex === 0);
              const m = items.find(i => i.datasetIndex === 1);
              if (!v || !m || v.parsed.y === null || m.parsed.y === null) return '';
              return 'Diferencia: ' + fSerie(v.parsed.y - m.parsed.y);
            },
          } },
        },
        scales: {
          y: { ...(minDato >= 0 ? { min: 0 } : {}), suggestedMax: (maxDato || 1) * 1.15, grid: { color: '#efeae3' }, ticks: { font: { family: 'Figtree' }, callback: v => fSerie(v) } },
          x: { grid: { display: false }, ticks: { font: { family: 'Figtree' } } },
        },
      },
    });
  }

  pintarGrafica();

  if (!registros.length) {
    document.getElementById('panel-registros').style.display = '';
    document.getElementById('registros').innerHTML =
      '<div class="detalle-vacio">Este producto no tiene registros cualitativos.</div>';
    return;
  }

  document.getElementById('panel-filtros').style.display = '';
  document.getElementById('panel-registros').style.display = '';

  // filtros a partir de los datos del producto
  const anios = [...new Set(registros.map(r => r.anio))].sort();
  const trimestres = [...new Set(registros.map(r => r.trimestre))].sort();
  const tipos = [...new Set(registros.map(r => r.tipo))].sort();

  const selAnio = document.getElementById('filtro-anio');
  anios.forEach(a => selAnio.insertAdjacentHTML('beforeend', `<option value="${a}">${a}</option>`));
  selAnio.addEventListener('change', () => { estado.anio = selAnio.value; pintar(); });

  const selTri = document.getElementById('filtro-trimestre');
  trimestres.forEach(t => selTri.insertAdjacentHTML('beforeend', `<option value="${t}">${t}</option>`));
  selTri.addEventListener('change', () => { estado.trimestre = selTri.value; pintar(); });

  const cajaTipos = document.getElementById('filtro-tipos');
  const chipTodos = document.createElement('button');
  chipTodos.className = 'chip activo';
  chipTodos.textContent = 'Todos';
  chipTodos.addEventListener('click', () => { estado.tipo = ''; refrescarChips(); pintar(); });
  cajaTipos.appendChild(chipTodos);
  tipos.forEach(t => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.tipo = t;
    b.textContent = t;
    b.addEventListener('click', () => { estado.tipo = (estado.tipo === t) ? '' : t; refrescarChips(); pintar(); });
    cajaTipos.appendChild(b);
  });
  function refrescarChips() {
    chipTodos.classList.toggle('activo', estado.tipo === '');
    cajaTipos.querySelectorAll('.chip[data-tipo]').forEach(c =>
      c.classList.toggle('activo', c.dataset.tipo === estado.tipo));
  }

  function pintar() {
    const filtrados = registros.filter(r =>
      (!estado.anio || String(r.anio) === estado.anio) &&
      (!estado.trimestre || r.trimestre === estado.trimestre) &&
      (!estado.tipo || r.tipo === estado.tipo));
    document.getElementById('conteo').textContent =
      filtrados.length.toLocaleString('es-CO') + ' registros';
    document.getElementById('registros').innerHTML = filtrados.length
      ? filtrados.map(r => `
        <div class="registro">
          <div class="registro-encabezado">${r.anio} · ${r.trimestre} · ${r.tipo}</div>
          <div class="registro-texto">${r.descripcion}</div>
        </div>`).join('')
      : '<div class="detalle-vacio">No hay registros con los filtros seleccionados.</div>';
  }

  pintar();
})();
</script>

</body>
</html>
